<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — AI Pulse PRO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; font-family: 'Segoe UI', sans-serif; padding: 24px; min-height: 100vh; }
    .card { background: #1a1a2e; border-radius: 16px; padding: 28px; max-width: 1100px; margin: 0 auto; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
    h1 { font-size: 22px; font-weight: 700; color: #e2d9f3; margin-bottom: 4px; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #2d2d4a; border-radius: 10px; font-size: 14px; outline: none; background: #0f0f1a; color: #e2d9f3; }
    button { padding: 11px 24px; background: linear-gradient(135deg,#7c3aed,#a855f7); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    .error { color: #f87171; font-size: 13px; margin-top: 8px; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: #0f0f1a; border-radius: 12px; padding: 16px 20px; text-align: center; }
    .stat-val { font-size: 28px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: #6b7280; margin-top: 4px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: #2d2d4a; color: #9ca3af; }
    .tab.active { background: linear-gradient(135deg,#7c3aed,#a855f7); color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 14px; color: #6b7280; font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #2d2d4a; }
    td { padding: 12px 14px; color: #e2d9f3; border-bottom: 1px solid #1f1f35; vertical-align: top; }
    .badge-paid { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .badge-trial { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #1c1917; color: #a8a29e; border: 1px solid #44403c; }
    .text-item { background: #0f0f1a; border-radius: 12px; padding: 14px 16px; border: 1px solid #2d2d4a; margin-bottom: 10px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    #login-screen { max-width: 400px; margin: 80px auto; }
    .login-icon { font-size: 48px; text-align: center; margin-bottom: 8px; }
    .search { margin-bottom: 14px; }
    .count-info { margin-top: 12px; color: #6b7280; font-size: 12px; }
    #admin-screen { display: none; }
  </style>
</head>
<body>

<div id="login-screen" class="card">
  <div class="login-icon">🔐</div>
  <h1 style="text-align:center">Админ-панель</h1>
  <p class="sub" style="text-align:center">AI Pulse PRO</p>
  <br/>
  <input type="password" id="pwd-input" placeholder="Введи пароль" />
  <div id="auth-error" class="error" style="display:none"></div>
  <button style="width:100%;margin-top:12px" onclick="doLogin()">Войти →</button>
</div>

<div id="admin-screen">
  <div class="card">
    <div class="header-row">
      <div>
        <h1>⚡ Админ-панель AI Pulse PRO</h1>
        <p class="sub">Управление пользователями и контентом</p>
      </div>
      <button onclick="refresh()">🔄 Обновить</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-total" style="color:#a78bfa">0</div><div class="stat-lbl">Всего юзеров</div></div>
      <div class="stat"><div class="stat-val" id="s-paid" style="color:#4ade80">0</div><div class="stat-lbl">Платных</div></div>
      <div class="stat"><div class="stat-val" id="s-trial" style="color:#fb923c">0</div><div class="stat-lbl">Триал</div></div>
      <div class="stat"><div class="stat-val" id="s-gen" style="color:#60a5fa">0</div><div class="stat-lbl">Генераций всего</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">👥 Пользователи</button>
      <button class="tab" onclick="switchTab(1)">📝 Тексты за 2 дня</button>
    </div>

    <div id="tab-users">
      <div class="search">
        <input type="text" id="search-input" placeholder="🔍 Поиск по имени, email или Telegram…" oninput="renderUsers()" />
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Имя</th><th>Email</th><th>Telegram</th>
              <th>Дата регистрации</th><th>Генераций</th><th>Статус</th><th>Оплата</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
      <div id="users-count" class="count-info"></div>
    </div>

    <div id="tab-texts" style="display:none">
      <div id="texts-count" class="count-info" style="margin-bottom:14px"></div>
      <div id="texts-list"></div>
    </div>
  </div>
</div>

<script>
  let pwd = "";
  let allUsers = [];
  let allTexts = [];

  document.getElementById("pwd-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  async function api(body) {
    const r = await fetch("/api/history", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...body, password: pwd })
    });
    return r.json();
  }

  async function doLogin() {
    pwd = document.getElementById("pwd-input").value;
    const btn = document.querySelector("#login-screen button");
    btn.textContent = "Проверяем…";
    btn.disabled = true;
    try {
      const data = await api({ action: "adminGetUsers" });
      if (data.error === "forbidden") {
        document.getElementById("auth-error").textContent = "Неверный пароль";
        document.getElementById("auth-error").style.display = "block";
        btn.textContent = "Войти →";
        btn.disabled = false;
        return;
      }
      allUsers = data.users || [];
      const td = await api({ action: "adminGetTexts" });
      allTexts = td.items || [];
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-screen").style.display = "block";
      renderAll();
    } catch(e) {
      document.getElementById("auth-error").textContent = "Ошибка соединения";
      document.getElementById("auth-error").style.display = "block";
      btn.textContent = "Войти →";
      btn.disabled = false;
    }
  }

  async function refresh() {
    try {
      const [ud, td] = await Promise.all([
        api({ action: "adminGetUsers" }),
        api({ action: "adminGetTexts" })
      ]);
      allUsers = ud.users || [];
      allTexts = td.items || [];
      renderAll();
    } catch(e) {}
  }

  function renderAll() {
    const paid = allUsers.filter(u => u.type === "paid").length;
    const trial = allUsers.filter(u => u.type === "trial").length;
    const gen = allUsers.reduce((s, u) => s + (u.usageCount || 0), 0);
    document.getElementById("s-total").textContent = allUsers.length;
    document.getElementById("s-paid").textContent = paid;
    document.getElementById("s-trial").textContent = trial;
    document.getElementById("s-gen").textContent = gen;
    renderUsers();
    renderTexts();
  }

  function renderUsers() {
    const q = document.getElementById("search-input").value.toLowerCase();
    const filtered = allUsers.filter(u =>
      !q || (u.name||"").toLowerCase().includes(q) ||
      (u.email||"").toLowerCase().includes(q) ||
      (u.telegram||"").toLowerCase().includes(q)
    );
    const tbody = document.getElementById("users-body");
    tbody.innerHTML = filtered.length === 0
      ? '<tr><td colspan="7" style="text-align:center;padding:32px;color:#6b7280">Нет данных</td></tr>'
      : filtered.map((u, i) => `
        <tr style="background:${i%2===0?'transparent':'rgba(255,255,255,.02)'}">
          <td><strong>${u.name||"—"}</strong></td>
          <td style="color:#a78bfa">${u.email||"—"}</td>
          <td style="color:#6b7280">${u.telegram||"—"}</td>
          <td style="color:#6b7280;white-space:nowrap">${u.registeredAt||"—"}</td>
          <td style="text-align:center;font-weight:700;color:#60a5fa">${u.usageCount||0}</td>
          <td><span class="${u.type==='paid'?'badge-paid':'badge-trial'}">${u.type==='paid'?'✅ Платный':'⏳ Триал'}</span></td>
          <td style="color:#4ade80;font-size:12px">${u.paidAt||"—"}</td>
<td>
  ${u.type !== 'paid' ? `<button onclick="setPaid('${u.id}')" style="padding:4px 12px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer">✅ Сделать платным</button>` : '<span style="color:#4ade80;font-size:12px">✓ платный</span>'}
</td>
        </tr>`).join("");
    document.getElementById("users-count").textContent = `Показано: ${filtered.length} из ${allUsers.length}`;
  }

  function renderTexts() {
    const list = document.getElementById("texts-list");
    document.getElementById("texts-count").innerHTML =
      `📝 Записей за последние 48 часов: <strong style="color:#a78bfa">${allTexts.length}</strong>
       <span style="margin-left:12px;color:#44403c">Старше 2 дней удаляются автоматически</span>`;
    list.innerHTML = allTexts.length === 0
      ? '<div style="text-align:center;padding:40px;color:#6b7280"><div style="font-size:36px;margin-bottom:12px">📭</div><div>Нет генераций за последние 2 дня</div></div>'
      : allTexts.map(item => `
        <div class="text-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div>
              <span style="font-weight:600;color:#a78bfa;font-size:13px">${item.type||"—"}</span>
              ${item.gender ? `<span style="margin-left:8px;font-size:11px;color:#6b7280">${item.gender==='female'?'♀ женщина':'♂ мужчина'}</span>` : ""}
            </div>
            <span style="font-size:11px;color:#44403c">${item.date ? new Date(item.date).toLocaleString("ru-RU") : "—"}</span>
          </div>
          <div style="font-size:13px;color:#e2d9f3">
            <span style="color:#6b7280">Тема: </span>${item.topic||"—"}
          </div>
          ${item.userId ? `<div style="font-size:11px;color:#44403c;margin-top:4px">ID: ${item.userId}</div>` : ""}
        </div>`).join("");
  }

  function switchTab(idx) {
    document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === idx));
    document.getElementById("tab-users").style.display = idx === 0 ? "block" : "none";
    document.getElementById("tab-texts").style.display = idx === 1 ? "block" : "none";
  }
</script>
</body>
</html>
